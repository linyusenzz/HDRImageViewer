name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # The native OpenEXR bridge and bundled encoder CLIs are optional,
      # conditionally-included build inputs; the app compiles without them.
      - name: Build app (x64)
        run: dotnet build .\HdrImageViewer.csproj -p:Platform=x64 -c Release --nologo

      - name: Run tests
        run: dotnet test .\tests\HdrImageViewer.Tests\HdrImageViewer.Tests.csproj -c Release --nologo
